version: '3.8'

services:
  backend:
    build:
      context: ./tradenerves-backend
      dockerfile: Dockerfile
    container_name: tradenerves-backend
    ports:
      - "5000:5000"
    volumes:
      # Persist database outside container
      - ./tradenerves-backend/backend/db:/app/db
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./tradenerves-frontend
      dockerfile: Dockerfile
    container_name: tradenerves-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  db_data:
    driver: local
